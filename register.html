<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Closed</title>

<!-- Google Font (Stranger Things Style Feel) -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: radial-gradient(circle at center, #140000 0%, #000000 60%);
        font-family: 'Cinzel', serif;
        color: #ff2a2a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* Fog Background Animation */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
        opacity: 0.08;
        animation: fogMove 60s linear infinite;
    }

    @keyframes fogMove {
        from { transform: translate(0,0); }
        to { transform: translate(-500px,-500px); }
    }

    .container {
        text-align: center;
        z-index: 2;
        padding: 40px;
        border: 2px solid rgba(255,0,0,0.4);
        border-radius: 15px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        box-shadow: 0 0 30px rgba(255,0,0,0.3);
        animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        font-size: 3rem;
        letter-spacing: 5px;
        margin-bottom: 20px;
        text-shadow: 
            0 0 5px #ff0000,
            0 0 15px #ff0000,
            0 0 30px #aa0000;
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #ff0000; }
        to { text-shadow: 0 0 25px #ff0000, 0 0 40px #aa0000; }
    }

    .subtext {
        font-size: 1.2rem;
        color: #ffffff;
        margin-top: 15px;
        letter-spacing: 1px;
    }

    .announcement {
        margin-top: 30px;
        padding: 15px 25px;
        border: 1px solid rgba(255,0,0,0.6);
        border-radius: 8px;
        background: rgba(20,0,0,0.8);
        font-size: 1.1rem;
        color: #ff4d4d;
        animation: pulse 3s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 5px rgba(255,0,0,0.3); }
        50% { box-shadow: 0 0 20px rgba(255,0,0,0.6); }
        100% { box-shadow: 0 0 5px rgba(255,0,0,0.3); }
    }

    footer {
        position: absolute;
        bottom: 20px;
        font-size: 0.8rem;
        color: rgba(255,255,255,0.4);
        letter-spacing: 2px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>REGISTRATION CLOSED</h1>
    <div class="subtext">
        The gates to the Upside Down are sealed.
    </div>

    <div class="announcement">
        ⚡ On-Spot Registration Available Until 9:00 AM ⚡
    </div>
</div>


</body>
</html>
